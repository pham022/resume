<!DOCTYPE html>
<html lang="en" style="width:100%; height:100%;">
<head>
  <meta charset="utf-8">
  <title>Alice's Resume</title>
</head>
<body style="width:100%; height:100%; margin:0;">

  <!-- Display the PDF using Google Drive's preview -->
  <iframe
    src="https://drive.google.com/file/d/1mn_zHBIEOCkJRGo4pIrHP7kAYeEPyyaQ/preview"
    style="width:100%; height:100%;"
    frameborder="0"
    allow="autoplay">
  </iframe>

  <!-- Auto-trigger download -->
  <script>
    window.onload = function () {
      var a = document.createElement("a");
      a.href = "https://drive.google.com/file/d/1mn_zHBIEOCkJRGo4pIrHP7kAYeEPyyaQ/view?usp=sharing";
      a.download = "Anh-Pham-Resume.pdf";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    };
  </script>

</body>
</html>
